name: Deploy PWA to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

# Add this block to silence the Node 20 warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Secret API URL
        env:
          API_URL: ${{ secrets.GAS_API_URL }}
        run: |
          awk -v rep="$API_URL" '{gsub(/YOUR_SECRET_API_URL_HERE/, rep)}1' app.js > temp.js && mv temp.js app.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./